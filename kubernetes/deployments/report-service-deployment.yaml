apiVersion: apps/v1
kind: Deployment
metadata:
  name: report-service
  namespace: scipilot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: report-service
  template:
    metadata:
      labels:
        app: report-service
    spec:
      containers:
      - name: report-service
        image: scipilot/report-service:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: scipilot-config
        - secretRef:
            name: scipilot-secrets
        resources:
          limits:
            cpu: "1000m"
            memory: "512Mi"
          requests:
            cpu: "500m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
