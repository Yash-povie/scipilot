[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",
    "E402",
    "F401",
]
per-file-ignores = { "tests/**" = ["F811", "F841"], "infrastructure/**" = ["F401"] }

[tool.ruff.lint.isort]
known-first-party = ["services", "agents"]