name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - run: pip install ruff mypy
    - run: ruff check .
    - run: mypy .
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - run: pip install pytest
    - run: pytest
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - run: docker build -t scipilot/api-gateway ./services/api-gateway
  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - run: echo "trivy scan"
