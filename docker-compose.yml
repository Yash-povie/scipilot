version: "3.9"

networks:
  scipilot:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  minio_data:
  redis_data:
  grafana_data:

services:

  # ﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬ Infrastructure ﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬ

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks: [scipilot]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    networks: [scipilot]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"
      - "7687:7687"
    networks: [scipilot]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 15s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks: [scipilot]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks: [scipilot]

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infrastructure/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
    ports:
      - "9090:9090"
    networks: [scipilot]

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./infrastructure/grafana/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3001:3000"
    networks: [scipilot]
    depends_on: [prometheus]

  # ﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬ Application Services ﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬ

  api-gateway:
    build: ./services/api-gateway
    env_file: .env
    ports:
      - "8000:8000"
    networks: [scipilot]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      retries: 5

  agent-service:
    build: ./services/agent-service
    env_file: .env
    ports:
      - "8001:8001"
    networks: [scipilot]
    depends_on:
      api-gateway: { condition: service_healthy }
    deploy:
      replicas: 1

  vector-service:
    build: ./services/vector-service
    env_file: .env
    ports:
      - "8002:8002"
    networks: [scipilot]
    depends_on:
      postgres: { condition: service_healthy }

  graph-service:
    build: ./services/graph-service
    env_file: .env
    ports:
      - "8003:8003"
    networks: [scipilot]
    depends_on:
      neo4j: { condition: service_healthy }

  cache-service:
    build: ./services/cache-service
    env_file: .env
    ports:
      - "8004:8004"
    networks: [scipilot]
    depends_on:
      redis: { condition: service_healthy }

  report-service:
    build: ./services/report-service
    env_file: .env
    ports:
      - "8005:8005"
    networks: [scipilot]
    depends_on:
      minio: { condition: service_healthy }

  frontend:
    build: ./frontend
    env_file: .env
    ports:
      - "3000:3000"
    networks: [scipilot]
    depends_on: [api-gateway]